name: money_manager
description: A personal expense management Flutter application
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  provider: ^6.1.1

  # Local Database
  sqflite: ^2.3.0
  path_provider: ^2.1.1
  path: ^1.8.3

  # Firebase
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  google_sign_in: ^6.2.2
  cloud_firestore: ^5.4.4
  firebase_storage: ^12.3.4
  firebase_messaging: ^15.1.3

  # Security
  flutter_secure_storage: ^9.0.0
  local_auth: ^2.1.7

  # Charts
  fl_chart: ^0.65.0

  # Notifications
  flutter_local_notifications: ^17.2.3

  # UI
  intl: ^0.18.1
  flutter_slidable: ^3.0.1
  shimmer: ^3.0.0

  # Utilities
  uuid: ^4.2.2
  shared_preferences: ^2.5.4
  get_it: ^7.6.4
  timezone: ^0.9.2
  http: ^1.6.0
  timeago: ^3.6.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: "ic_launcher"
  ios: false
  image_path: "assets/images/ic_launcher.png"
  min_sdk_android: 21
  # Remove adaptive icons to use standard icons only
  remove_alpha_ios: true

flutter:
  uses-material-design: true

  assets:
    - assets/images/

  # fonts:
